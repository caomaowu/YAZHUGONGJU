server {
    listen 80;
    server_name yazhu.caomaowu.lol;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yazhu.caomaowu.lol;

    ssl_certificate /root/YAZHUGONGJU/caomaowu.lol-ssl-bundle/domain.cert.pem;
    ssl_certificate_key /root/YAZHUGONGJU/caomaowu.lol-ssl-bundle/private.key.pem;

    client_max_body_size 256m;

    # 开启 Gzip 压缩
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/x-javascript application/xml;
    gzip_vary on;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 关键优化：关闭缓冲，解决大文件下载时的阻塞问题
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        
        # 增加超时时间
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
